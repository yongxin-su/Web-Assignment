<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
 
  
<div id="loginModal" class="login-background">
    <div class="login-box">
        <h2 class="login-title">Login</h2>
        <form>
            
            <label class="input">Name: 
                <input type="text" id="loginName" placeholder="Name" autocomplete="username">
            </label>
            
            <label class="input">Email: 
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            </label>
            <div class="login-smallbox ">
            <label class="input">Pass: 
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
            </label>
        </div>
            
            <br>
            <br>
            <input type="checkbox" id="rememberMe">
                    <span>Remember Me</span>
            <button type="button" class="login-button" onclick="login()">Login</button>
            
            <p id="errorMsg" class="error-msg">Please fill in all the blanks</p>

            <br><br>
            <a href="#" class="forgot-p" onclick="forgotPassword(event)">Forgot Password?</a>
        </form>
    </div>

</div>

<script>
    window.addEventListener("DOMContentLoaded", () => {
        const savedName = localStorage.getItem("rememberedName");
        const savedEmail = localStorage.getItem("rememberedEmail");

        if (savedName && savedEmail) {
            document.getElementById("loginName").value = savedName;
            document.getElementById("loginEmail").value = savedEmail;
            document.getElementById("rememberMe").checked = true;
        }
    });

    function login (){
    const name = document.getElementById("loginName").value.trim();
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    if (!name || !email || !password) {
        document.getElementsByClassName("error-msg")[0].style.display = "block";
        return; }

      localStorage.setItem("Username", name);

      if (rememberMe) {
            localStorage.setItem("rememberedName", name);
            localStorage.setItem("rememberedEmail", email);

        } else {
            localStorage.removeItem("rememberedName");
            localStorage.removeItem("rememberedEmail");
        }
     
      window.location.href = "home.html";
   
}

function closeModal() {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("errorMsg").innerText = "Please fill in the blanks";
}

function forgotPassword(event) {
        event.preventDefault();
        const email = document.getElementById("loginEmail").value.trim();

        if (!email) {
            alert("Please enter your email address first so we can send a reset link.");
            document.getElementById("loginEmail").focus();
            return;
        }
    }
const SavedUser = localStorage.getItem("Username")

</script>
</body>
