<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
 
  
<div id="loginModal" class="login-background">
    <div class="login-box">
        <h2 class="login-title">Login</h2>
        <form>
            <input type="text" id="loginName" placeholder="Name">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button type="button" class="login-button" onclick="login()">Login</button>
            <p id="errorMsg" class="error-msg">Please fill in all the blanks</p>
        </form>
    </div>

</div>

<script>
    function login (){
    const name = document.getElementById("loginName").value.trim();
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    if (!name || !email || !password) {
        document.getElementsByClassName("error-msg")[0].style.display = "block";
        return; }

      localStorage.setItem("Username", name);
     
      window.location.href = "home.html";
   
}

function closeModal() {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("errorMsg").innerText = "Please fill in the blanks";
}

const SavedUser = localStorage.getItem("Username")

</script>
</body>
